<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Apple Reminders for Claude — high5 ventures GmbH</title>
  <!--
    Brand colors: Cyan primary (#00FFFF), Blau secondary (#004B73), Weiß (#FFFFFF).
    Concept: signet circle as background metaphor for Reminders,
    white checkmark inside, small "h5" watermark bottom-right as provenance.
    Note: colors inherited from previous brand; revisit when high5 ventures
    brand palette is finalized.
  -->
  <defs>
    <radialGradient id="bg" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#4AEAFF"/>
      <stop offset="100%" stop-color="#00B5D9"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square mat: macOS/iOS app-icon idiom, cyan gradient -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Signet circle: white ring at ¾ scale in upper area -->
  <circle cx="256" cy="246" r="170" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="256" cy="246" r="170" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.35"/>

  <!-- Checkmark — the Reminders metaphor, in pure white, heavy stroke -->
  <g filter="url(#softShadow)">
    <path d="M 172 258 L 232 318 L 348 192"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="42"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- "h5" watermark, bottom-right, dark blue, low opacity -->
  <text x="462"
        y="478"
        font-family="Days One, Avenir Next LT Pro, Helvetica, Arial, sans-serif"
        font-size="72"
        font-weight="400"
        fill="#004B73"
        opacity="0.55"
        text-anchor="end">h5</text>
</svg>
