<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Apple Reminders for Claude — high5 ventures GmbH</title>
  <!--
    Brand: high5 ventures (palette from h5ventures.de).
      primary  #f58220
      light    #ff9a3e
    Concept: macOS/iOS rounded-square mat in brand orange, h5 signet
    centered. Function-context (Reminders) carried by the manifest title
    and tool annotations rather than the icon glyph.
  -->
  <defs>
    <radialGradient id="bg" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#ff9a3e"/>
      <stop offset="100%" stop-color="#f58220"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <image href="data:image/png;base64," x="76" y="76" width="360" height="360"/>
</svg>
