name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, sign, notarize, publish
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      # actions/checkout@v6.0.2
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

      - name: Verify manifest versions match tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for f in mcpb/manifest.json mcpb/package.json npm-package/package.json npm-package/server.json .claude-plugin/plugin.json; do
            jq -er --arg v "$VERSION" --arg f "$f" \
              'if .version == $v then true else error("\($f) version \(.version) ≠ tag \($v)") end' "$f"
          done

      # actions/setup-node@v6.4.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install MCPB CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain-db
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application: high5 ventures GmbH/ {print $2; exit}')
          if [[ -z "$IDENTITY" ]]; then
            echo "No 'Developer ID Application: high5 ventures GmbH' identity found in keychain" >&2
            security find-identity -v -p codesigning "$KEYCHAIN" >&2
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Build signed Swift binary
        run: ./build.sh binary

      - name: Verify binary signature
        run: |
          codesign --verify --verbose dist/reminders-eventkit
          spctl --assess --type execute --verbose dist/reminders-eventkit || true
          codesign -dv --entitlements :- dist/reminders-eventkit

      - name: Build .mcpb bundle
        run: ./build.sh mcpb

      - name: Notarize .mcpb bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/notarize.sh dist/apple-reminders.mcpb

      - name: Validate bundle integrity
        run: |
          ~/.local/bin/mcpb validate mcpb/manifest.json || mcpb validate mcpb/manifest.json
          # .mcpb cannot be stapled (see scripts/notarize.sh) — verify the
          # bundled binary's hardened-runtime signature instead.
          unzip -p dist/apple-reminders.mcpb bin/reminders-eventkit > /tmp/bin-extract
          chmod +x /tmp/bin-extract
          codesign --verify --verbose /tmp/bin-extract

      # GitHub Release MUST be created BEFORE the npm package is published.
      # The npm postinstall fetches the binary from this release URL; if npm
      # publishes first and the release step then fails, the npm version is
      # immutable and broken for fresh installs.
      # softprops/action-gh-release@v3.0.0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: .github/release-body.md
          fail_on_unmatched_files: true
          files: |
            dist/apple-reminders.mcpb
            dist/reminders-eventkit

      - name: Stage npm-package with signed binary
        run: |
          mkdir -p npm-package/bin
          cp dist/reminders-eventkit npm-package/bin/reminders-eventkit
          cd npm-package
          npm install --no-audit --no-fund --ignore-scripts

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm-package
          # The published tarball must NOT include the local binary — end users
          # download it via the postinstall script. Remove before pack.
          rm -f bin/reminders-eventkit
          npm publish --access public

      - name: Install mcp-publisher (pinned + checksum-verified)
        run: |
          MCP_PUBLISHER_VERSION=v1.7.0
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          ASSET="mcp-publisher_${OS}_${ARCH}.tar.gz"

          # Hashes from the v1.7.0 release's checksums file. Update on bump.
          # `case` instead of `declare -A` so this works on Bash 3.2 (macOS).
          case "${OS}_${ARCH}" in
            darwin_arm64) EXPECTED=9bad6be86bcdda29d037c2af6e0fa635fd2709830ecefe2ece6fc2b81dcfe1f2 ;;
            darwin_amd64) EXPECTED=7b0bf82c74453f39e4030c11fccfe9ea3019786982b473be6b4e0fdfac6c2ca4 ;;
            linux_arm64)  EXPECTED=e4412248080b3646601724f672f3aad742d1043c8b7d98e8b0cf4162f37053f7 ;;
            linux_amd64)  EXPECTED=5c61dd7dd33bbf00c9c0f569d3dc2f95bbbbfec0c6951a681a2dd573cb376851 ;;
            *) echo "no pinned checksum for ${OS}_${ARCH}" >&2; exit 1 ;;
          esac

          curl -fsSL -o "$RUNNER_TEMP/$ASSET" \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${ASSET}"

          echo "${EXPECTED}  $RUNNER_TEMP/$ASSET" | shasum -a 256 -c -

          tar -xz -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/$ASSET" mcp-publisher
          chmod +x "$RUNNER_TEMP/mcp-publisher"

      - name: Publish to MCP Registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd npm-package
          # mcp-publisher needs interactive github-oauth; for CI we use the
          # GitHub Actions OIDC flow via the mcp-publisher github-oidc method.
          "$RUNNER_TEMP/mcp-publisher" login github-oidc
          "$RUNNER_TEMP/mcp-publisher" publish

      - name: Clean up keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security delete-keychain build.keychain-db || true
